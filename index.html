<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Webpage Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white p-6">

  <div class="max-w-5xl mx-auto">
    <h1 class="text-3xl font-bold mb-4">⚡ AI Webpage Generator</h1>

    <textarea id="prompt"
      class="w-full p-3 rounded bg-gray-800 border border-gray-700"
      placeholder="Describe your webpage..."></textarea>

    <button onclick="generate()"
      class="mt-4 px-6 py-2 bg-blue-600 rounded hover:bg-blue-700">
      Generate
    </button>

    <div class="mt-6 grid grid-cols-2 gap-4">
      
      <!-- Code -->
      <div>
        <h2 class="text-lg font-semibold mb-2">HTML Code</h2>
        <pre id="code" class="bg-black p-3 rounded h-96 overflow-auto"></pre>
      </div>

      <!-- Preview -->
      <div>
        <h2 class="text-lg font-semibold mb-2">Preview</h2>
        <iframe id="preview" class="w-full h-96 bg-white rounded"></iframe>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
